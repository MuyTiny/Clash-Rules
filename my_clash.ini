[common]
; 这里的 URL 填你原始的节点订阅（或是你 GCP 2096 端口那个节点文件）
; 如果不想在 ini 里写死，转换链接里的 &url= 会覆盖它
target=clash
no_logic=false

[proxy_group]
; 这里定义你的策略组，和你之前的 yaml 逻辑一致
🔰 节点选择:select:[]proxy
💻 程序员专线:select:[]🔰 节点选择!!DIRECT
🚫 广告拦截:select:[]REJECT!!DIRECT
🎬 国际媒体:select:[]🔰 节点选择!!DIRECT
🌍 全球直连:select:[]DIRECT!!🔰 节点选择
🐟 漏网之鱼:select:[]🔰 节点选择!!DIRECT

[rule_set]
; 这里引用你喜欢的远程规则集（比如 Loyalsoldier 的）
reject,https://github.com/Loyalsoldier/clash-rules/raw/release/reject.txt
privacy,https://github.com/Loyalsoldier/clash-rules/raw/release/privacy.txt
github,https://github.com/Loyalsoldier/clash-rules/raw/release/github.txt
google,https://github.com/Loyalsoldier/clash-rules/raw/release/google.txt
proxy,https://github.com/Loyalsoldier/clash-rules/raw/release/proxy.txt
direct,https://github.com/Loyalsoldier/clash-rules/raw/release/direct.txt

[rules]
; 具体的路由逻辑
DOMAIN,gcp.tiyang.work,DIRECT
RULE-SET,reject,🚫 广告拦截
RULE-SET,github,💻 程序员专线
RULE-SET,google,🎬 国际媒体
GEOIP,CN,🌍 全球直连
MATCH,🐟 漏网之鱼
