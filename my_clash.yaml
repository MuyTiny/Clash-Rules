# ---------------------------------------------------
# MuyTiny 终极模块化云端配置 (2026 增强版)
# 核心升级：增加可视化广告拦截开关 + 隐私追踪保护
# ---------------------------------------------------

# 1. 节点供应
proxy-providers:
  GCP_Nodes:
    type: http
    # 使用这个带转换器的 IP 链接，能把 vless 变成 YAML 格式
    url: "http://104.199.143.197:25500/sub?target=clash&url=http://104.199.143.197:2096/sub/my_all_nodes"
    path: ./proxy_provider/my_nodes.yaml
    headers:
      User-Agent: ["Clash"]
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# 2. 策略组 (增加 🚫 广告拦截 可视化开关)
proxy-groups:
  - name: 🔰 节点选择
    type: select
    use: [GCP_Nodes]

  - name: 💻 程序员专线
    type: select
    proxies: [🔰 节点选择, DIRECT]
    use: [GCP_Nodes]

  - name: 🎮 游戏平台
    type: select
    proxies: [DIRECT, 🔰 节点选择]
    use: [GCP_Nodes]

  - name: 🚫 广告拦截
    type: select
    proxies: [REJECT, DIRECT]

  - name: 🎬 国际媒体
    type: select
    proxies: [🔰 节点选择, DIRECT]
    use: [GCP_Nodes]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🔰 节点选择, DIRECT]
    use: [GCP_Nodes]

  - name: 🌍 全球直连
    type: select
    proxies: [DIRECT, 🔰 节点选择]

