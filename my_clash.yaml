# ---------------------------------------------------
# MuyTiny 终极模块化云端配置 (基于 Loyalsoldier 规则集)
# 适应场景：Unity 开发、游戏加速、全自动分流
# ---------------------------------------------------

# 1. 节点供应 (直接从你的 GCP 服务器拉取原生节点)
proxy-providers:
  GCP_Nodes:
    type: http
    url: "http://gcp.tiyang.work:2096/sub/my_all_nodes"
    path: ./proxies/my_nodes.yaml
    interval: 3600
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300

# 2. 策略组 (Unity 开发者定制版)
proxy-groups:
  - name: 🔰 节点选择
    type: select
    use: [GCP_Nodes]

  - name: 💻 程序员专线
    type: select
    proxies: [🔰 节点选择, DIRECT]
    use: [GCP_Nodes]

  - name: 🎮 游戏平台
    type: select
    proxies: [DIRECT, 🔰 节点选择]
    use: [GCP_Nodes]

  - name: 🎬 国际媒体
    type: select
    proxies: [🔰 节点选择, DIRECT]
    use: [GCP_Nodes]

  - name: 🐟 漏网之鱼
    type: select
    proxies: [🔰 节点选择, DIRECT]
    use: [GCP_Nodes]

  - name: 🌍 全球直连
    type: select
    proxies: [DIRECT, 🔰 节点选择]

# 3. 规则供应 (补全了你担心的所有 Loyalsoldier 核心库)
rule-providers:
  reject:
    type: http
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
    path: ./ruleset/reject.yaml
    interval: 86400
