# 4. 路由规则 (严格执行优先级顺序)
rules:
  # 【优先级 1】自定义强制规则 (解决翻译、Unity 特定域名等)
  - DOMAIN-KEYWORD,translate,🐟 漏网之鱼
  - DOMAIN-SUFFIX,googleapis.com,🐟 漏网之鱼

  # 【优先级 2】基础连接限制 (私有网络/本地请求)
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve

  # 【优先级 3】广告拦截
  - RULE-SET,reject,REJECT

  # 【优先级 4】细分服务分流
  - RULE-SET,github,💻 程序员专线
  - RULE-SET,microsoft,💻 程序员专线
  - RULE-SET,steam,🎮 游戏平台
  - RULE-SET,google,🐟 漏网之鱼
  - RULE-SET,apple,🌍 全球直连
  - RULE-SET,icloud,🌍 全球直连
  - RULE-SET,telegramcidr,🐟 漏网之鱼,no-resolve

  # 【优先级 5】大规模黑名单 (GFW/Proxy 列表)
  - RULE-SET,gfw,🐟 漏网之鱼
  - RULE-SET,proxy,🐟 漏网之鱼

  # 【优先级 6】国内直连 (白名单)
  - RULE-SET,direct,🌍 全球直连
  - RULE-SET,cncidr,🌍 全球直连,no-resolve

  # 【优先级 7】兜底 (防止漏网)
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,🐟 漏网之鱼
