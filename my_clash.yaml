# 4. 路由规则
rules:
  # 【强制首位】解开节点拉取死锁
  - DOMAIN,gcp.tiyang.work,DIRECT

  # 【优先级 1】自定义强制规则
  - DOMAIN,translate.googleapis.com,🐟 漏网之鱼
  - DOMAIN-SUFFIX,translate.google.com,🐟 漏网之鱼
  - DOMAIN,translate.google.cn,🐟 漏网之鱼
  - DOMAIN-SUFFIX,googleapis.com,🐟 漏网之鱼

  # 【优先级 2】基础连接限制
  - RULE-SET,private,DIRECT
  - RULE-SET,lancidr,DIRECT,no-resolve

  # 【优先级 3】可视化广告拦截
  - RULE-SET,reject,🚫 广告拦截
  - RULE-SET,privacy,🚫 广告拦截

  # 【优先级 4】细分分流
  - RULE-SET,github,💻 程序员专线
  - RULE-SET,microsoft,💻 程序员专线
  - RULE-SET,steam,🎮 游戏平台
  - RULE-SET,google,🐟 漏网之鱼
  - RULE-SET,apple,🌍 全球直连
  - RULE-SET,icloud,🌍 全球直连
  - RULE-SET,telegramcidr,🐟 漏网之鱼,no-resolve

  # 【优先级 5】代理列表
  - RULE-SET,gfw,🐟 漏网之鱼
  - RULE-SET,proxy,🐟 漏网之鱼

  # 【优先级 6】直连列表
  - RULE-SET,direct,🌍 全球直连
  - RULE-SET,cncidr,🌍 全球直连,no-resolve

  # 【优先级 7】兜底
  - GEOIP,LAN,DIRECT,no-resolve
  - GEOIP,CN,DIRECT,no-resolve
  - MATCH,🐟 漏网之鱼
